name: Build Windows

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Download HLLib binaries
      run: |
        Invoke-WebRequest -Uri https://github.com/nemesisx00/HLLib/releases/download/2.4.1/HLLib_2.4.1.zip -OutFile HLLib.zip
        Expand-Archive -Path HLLib.zip -DestinationPath external/hllib

    - name: Configure CMake
      run: cmake -B build -S . -DCMAKE_BUILD_TYPE=Release

    - name: Build
      run: cmake --build build --config Release

    - name: Test
      run: cd build && ctest --output-on-failure