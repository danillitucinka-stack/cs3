name: Build Windows

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup MSVC
      uses: ilammy/msvc-dev-cmd@v1
    - name: Configure CMake
      run: cmake -B build -DCMAKE_BUILD_TYPE=Release
    - name: Build
      run: cmake --build build --config Release
    - name: Download models
      run: Invoke-WebRequest -Uri https://github.com/m-p-3/cs16-models/archive/refs/heads/master.zip -OutFile models.zip
    - name: Unzip models
      run: |
        New-Item -ItemType Directory -Path build/Release/resources/models -Force
        Expand-Archive -Path models.zip -DestinationPath temp
        Copy-Item -Path temp/cs16-models-master/* -Destination build/Release/resources/models/ -Recurse -Force
        Remove-Item temp -Recurse -Force
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: cs3-windows
        path: build/Release/